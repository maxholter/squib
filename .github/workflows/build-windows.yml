name: Build Windows installer

# Builds the PayTrack Windows .exe on a Windows runner (the native SQLite module
# must be compiled on Windows, so this can't be done reliably from macOS).
#
# Two ways to run it:
#   1. Manually  — Actions tab → "Build Windows installer" → "Run workflow".
#                  Download the "PayTrack-Windows" artifact when it finishes.
#   2. On a tag  — push a version tag (e.g. `git tag v0.1.0 && git push origin v0.1.0`).
#                  The installer is published to a GitHub Release, giving your
#                  friends a plain download link (no GitHub login needed).

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write # needed to create the Release on tag pushes
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      # Build the Next.js app, then package the Windows installer.
      # --publish never stops electron-builder from trying to upload to GitHub
      # itself (the "Publish to GitHub Release" step below handles that).
      - name: Build Windows installer
        run: |
          npm run build
          npx electron-builder --win --publish never

      # Always upload the installer as a build artifact (available on every run,
      # including manual ones). Requires a GitHub login to download.
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: PayTrack-Windows
          path: dist-app/*.exe
          if-no-files-found: error

      # When triggered by a version tag, also publish a public Release with the
      # installer attached — this is the link you send to non-technical users.
      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          # Remove any existing release for this tag so re-runs are idempotent
          # (keeps the git tag; only clears the release + its assets).
          gh release delete "${GITHUB_REF_NAME}" --yes 2>/dev/null || true
          gh release create "${GITHUB_REF_NAME}" dist-app/*.exe \
            --title "PayTrack ${GITHUB_REF_NAME}" \
            --notes "Windows installer for PayTrack ${GITHUB_REF_NAME}. Download the \`.exe\` below, run it, and click **More info → Run anyway** if Windows SmartScreen warns about an unknown publisher."
