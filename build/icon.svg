<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e2e8f0"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" rx="230" fill="url(#bg)"/>
  <!-- wallet body -->
  <rect x="232" y="330" width="560" height="380" rx="56" fill="url(#card)"/>
  <!-- wallet flap / clasp pocket -->
  <path d="M232 470 h560 v150 a56 56 0 0 1 -56 56 h-448 a56 56 0 0 1 -56 -56 z" fill="#cbd5e1"/>
  <!-- clasp button -->
  <circle cx="700" cy="545" r="38" fill="#0f172a"/>
  <circle cx="700" cy="545" r="16" fill="#22c55e"/>
  <!-- upward trend arrow (growth) -->
  <polyline points="300,430 400,390 470,415 560,355"
            fill="none" stroke="#22c55e" stroke-width="26"
            stroke-linecap="round" stroke-linejoin="round"/>
  <polygon points="560,355 512,352 548,318" fill="#22c55e"/>
</svg>
